<aside class="flex flex-col h-full bg-bg">

  <!-- Mobile top bar (hidden at md+) -->
  <div class="flex md:hidden items-center justify-between px-4 border-b border-ink h-14">
    <div class="flex flex-col leading-none">
      <span class="font-serif text-lg font-black tracking-tight text-ink leading-tight">Ethan Edwards</span>
      <span class="font-body text-[0.65rem] italic text-neutral-600 mt-0.5">AI Solutions Architect</span>
    </div>
    <nav class="flex items-stretch h-full" aria-label="Main navigation">
      <a
        routerLink="/"
        routerLinkActive="border-b-[#cc0000]! text-ink"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center justify-center px-3 min-w-[44px] font-sans text-[0.7rem] font-semibold uppercase tracking-widest text-neutral-600 no-underline border-b-2 border-b-transparent transition-all duration-200 hover:text-ink"
      >
        Projects
      </a>
      <a
        routerLink="/resume"
        routerLinkActive="border-b-[#cc0000]! text-ink"
        class="flex items-center justify-center px-3 min-w-[44px] font-sans text-[0.7rem] font-semibold uppercase tracking-widest text-neutral-600 no-underline border-b-2 border-b-transparent transition-all duration-200 hover:text-ink"
      >
        Resume
      </a>
      <a
        routerLink="/contact"
        routerLinkActive="border-b-[#cc0000]! text-ink"
        class="flex items-center justify-center px-3 min-w-[44px] font-sans text-[0.7rem] font-semibold uppercase tracking-widest text-neutral-600 no-underline border-b-2 border-b-transparent transition-all duration-200 hover:text-ink"
      >
        Contact
      </a>
    </nav>
  </div>

  <!-- Desktop sidebar column (hidden below md) -->

    <!-- Masthead -->
    <header class="px-6 pt-6 pb-4 border-b-4 border-ink">
      <p class="font-mono text-[0.65rem] uppercase tracking-[0.2em] text-accent mb-2">Portfolio</p>

      <div class="w-36 h-41 mb-3 border-2 border-ink overflow-hidden shrink-0">
        <img
          ngSrc="profile-picture.jpg"
          alt="Ethan Edwards"
          width="500"
          height="500"
          class="block w-full h-full object-cover object-[center_12%] grayscale hover:filter-[grayscale(0%)_sepia(20%)] transition-[filter] duration-300 ease-out"
          priority
        />
      </div>

      <h1 class="font-serif text-[3rem] font-black leading-none tracking-[-0.02em] text-ink mb-2.5">
        Ethan<br />Edwards
      </h1>
      <p class="font-body text-[1rem] italic text-neutral-600 leading-snug m-0">
        AI Solutions Architect
      </p>
    </header>

    <div class="h-0.5 bg-ink" role="separator"></div>

    <div class="h-px bg-ink" role="separator"></div>
